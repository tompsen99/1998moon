<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平均数可视化课件</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans SC', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        header {
            background: white;
            padding: 16px 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .title-input {
            font-size: 28px;
            font-weight: 700;
            color: #1e40af;
            border: none;
            background: transparent;
            width: 520px;
        }
        .main-container {
            display: flex;
            flex: 1;
            padding: 16px;
            gap: 16px;
            overflow: hidden;
        }
        .sidebar {
            width: 360px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            overflow-y: auto;
        }
        .chart-area {
            flex: 1;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        canvas { 
            flex: 1; 
            cursor: pointer;
            touch-action: none;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-around;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 16px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 16px;
        }
        .data-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #f8fafc;
            border-radius: 14px;
            margin-bottom: 12px;
        }
        .color-dot { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
        input[type="text"] { flex: 1; font-size: 22px; padding: 8px; border-radius: 10px; border: 2px solid #cbd5e1; }
        
        .value-controls {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .value-btn {
            width: 46px;
            height: 46px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-minus { background: #ef4444; color: white; }
        .btn-plus { background: #22c55e; color: white; }
        
        #success-msg {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(34,197,94,0.4);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <input id="custom-title" type="text" value="小学数学 · 移多补少求平均数" class="title-input">
        <div>
            <button onclick="undoLast()" style="margin-right:12px; padding:10px 20px; font-size:18px;">↩️ 撤销</button>
            <button onclick="resetCurrent()" style="padding:10px 20px; font-size:18px;">重置场景</button>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h2 style="font-size:26px; margin-bottom:16px;">📋 数据编辑区</h2>
            <div id="data-list"></div>
            <button onclick="addStudent()" style="width:100%; margin-top:16px; padding:16px; font-size:20px; background:#22c55e; color:white; border:none; border-radius:16px; cursor: pointer;">
                ➕ 添加学生
            </button>
        </div>

        <div class="chart-area">
            <div class="stat-row">
                <span>总和: <span id="total" style="color:#1e40af">0</span></span>
                <span>人数: <span id="count" style="color:#1e40af">0</span></span>
                <span>平均数: <span id="avg" style="color:#ef4444">0</span></span>
            </div>
            <div id="success-msg">🎉 完美！所有列都达到平均数了！</div>
            <canvas id="canvas" width="920" height="520"></canvas>
            <div style="text-align:center; margin-top:12px; font-size:18px; color:#475569;">
                操作提示：按住较高的方块堆 → 拖动到较低的方块堆上方 → 松开鼠标，观察平均线的变化。
            </div>
        </div>
    </div>

    <script>
        let students = [
            {id:1, name:"杨羽", color:"#3b82f6", blocks: Array(6).fill("#3b82f6")},
            {id:2, name:"曾诗涵", color:"#ec4899", blocks: Array(8).fill("#ec4899")},
            {id:3, name:"李婷", color:"#8b5cf6", blocks: Array(5).fill("#8b5cf6")},
            {id:4, name:"张伟", color:"#14b8a6", blocks: Array(10).fill("#14b8a6")},
            {id:5, name:"王芳", color:"#f59e0b", blocks: Array(6).fill("#f59e0b")}
        ];

        let history = [];
        let canvas, ctx;
        let dragged = null;   
        let isDragging = false;
        let mousePos = { x: 0, y: 0 }; 

        // 统一坐标系参数（动态计算，此处只声明）
        let layout = { pl: 80, pr: 40, pb: 60, pt: 60, unitHeight: 0, blockWidth: 0, boxSize: 0, gap: 0, baseY: 0, yAxisMax: 15 };

        function saveHistory() {
            history.push(JSON.stringify(students));
            if (history.length > 15) history.shift();
        }

        function undoLast() {
            if (history.length === 0) return alert("没有可撤销的操作了");
            students = JSON.parse(history.pop());
            renderSidebar();
            updateStats();
            draw();
        }

        function init() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');

            function resize() {
                const w = Math.min(document.querySelector('.chart-area').clientWidth - 40, 920);
                canvas.width = w;
                canvas.height = 520;
                draw();
            }
            window.addEventListener('resize', resize);
            resize();

            canvas.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove); 
            document.addEventListener('mouseup', onMouseUp);      
            canvas.addEventListener('touchstart', onTouchStart, {passive: false});
            document.addEventListener('touchmove', onTouchMove, {passive: false});
            document.addEventListener('touchend', onMouseUp);

            renderSidebar();
            updateStats();
            draw();
            saveHistory();
        }

        function renderSidebar() {
            const container = document.getElementById('data-list');
            container.innerHTML = '';
            students.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'data-item';
                div.innerHTML = `
                    <div class="color-dot" style="background:${s.color}"></div>
                    <input type="text" value="${s.name}" onchange="changeName(${i}, this.value)">
                    <div class="value-controls">
                        <button class="value-btn btn-minus" onclick="changeValue(${i}, -1)">-1</button>
                        <span style="font-size:26px; font-weight:700; min-width:50px; text-align:center;">${s.blocks.length}</span>
                        <button class="value-btn btn-plus" onclick="changeValue(${i}, 1)">+1</button>
                    </div>
                    <button onclick="removeStudent(${i})" style="background:#ef4444;color:white;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;">×</button>
                `;
                container.appendChild(div);
            });
        }

        function changeName(i, name) {
            if (name.trim()) students[i].name = name.trim();
            renderSidebar();
            draw();
        }

        function changeValue(i, delta) {
            saveHistory();
            if (delta > 0) {
                students[i].blocks.push(students[i].color);
            } else {
                if (students[i].blocks.length > 0) students[i].blocks.pop();
            }
            renderSidebar();
            updateStats();
            draw();
        }

        function addStudent() {
            const colors = ["#3b82f6","#ec4899","#8b5cf6","#14b8a6","#f59e0b","#06b67f"];
            const newColor = colors[students.length % colors.length];
            students.push({
                id: Date.now(), 
                name: "新同学" + (students.length + 1), 
                color: newColor, 
                blocks: Array(6).fill(newColor)
            });
            saveHistory();
            renderSidebar();
            updateStats();
            draw();
        }

        function removeStudent(i) {
            if (students.length <= 1) return alert("至少保留一个学生");
            students.splice(i, 1);
            saveHistory();
            renderSidebar();
            updateStats();
            draw();
        }

        function updateStats() {
            const sum = students.reduce((a, s) => a + s.blocks.length, 0);
            const count = students.length;
            const avg = count ? (sum / count).toFixed(1) : 0;
            document.getElementById('total').textContent = sum;
            document.getElementById('count').textContent = count;
            
            // 检查是否完美平均
            const isBalanced = count > 0 && students.every(s => s.blocks.length === parseFloat(avg));
            const avgEl = document.getElementById('avg');
            const msgEl = document.getElementById('success-msg');
            
            if (isBalanced) {
                avgEl.style.color = '#22c55e';
                msgEl.style.opacity = '1';
            } else {
                avgEl.style.color = '#ef4444';
                msgEl.style.opacity = '0';
            }
            avgEl.textContent = avg;
        }

        // 绘制单个方块
        function drawSingleBlock(x, y, width, height, color, isShadow = false) {
            ctx.fillStyle = color;
            if (isShadow) {
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 10;
            } else {
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 3;
                ctx.shadowOffsetY = 2;
            }
            ctx.fillRect(x, y, width, height);
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;

            ctx.strokeStyle = 'rgba(255,255,255,0.6)';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 1, y + 1, width - 2, height - 2);
        }

        // 计算布局系（解决对齐Bug的核心）
        function updateLayout() {
            const n = students.length;
            if (n === 0) return;

            const ch = canvas.height - layout.pt - layout.pb;
            
            // 找到最高的列，并向上取整到5的倍数来作为Y轴最大值，保证坐标系稳定
            let maxBlocks = Math.max(0, ...students.map(s => s.blocks.length));
            layout.yAxisMax = Math.max(12, Math.ceil((maxBlocks + 2) / 5) * 5); 

            // 核心：严格数学映射。单位高度 = 绘制区总高度 / 最大刻度
            layout.unitHeight = ch / layout.yAxisMax;
            layout.baseY = canvas.height - layout.pb;

            const availableWidth = canvas.width - layout.pl - layout.pr;
            layout.blockWidth = Math.min(56, (availableWidth / n) * 0.5); // 动态方块宽度
            layout.gap = layout.unitHeight * 0.15; // 垂直间隙
            layout.boxSize = layout.unitHeight - layout.gap; // 纯色块的高度
        }

        function draw() {
            updateLayout();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const n = students.length;
            if (n === 0) return;

            // 1. 绘制严格对齐的Y轴和网格线
            ctx.beginPath();
            for (let val = 0; val <= layout.yAxisMax; val++) {
                const y = layout.baseY - val * layout.unitHeight;
                
                if (val % 5 === 0 || val === layout.yAxisMax) {
                    // 主刻度及横向网格
                    ctx.strokeStyle = '#e2e8f0'; // 网格线颜色
                    ctx.lineWidth = 1;
                    ctx.moveTo(layout.pl, y);
                    ctx.lineTo(canvas.width - layout.pr, y);
                    ctx.stroke();

                    ctx.fillStyle = '#475569';
                    ctx.font = 'bold 20px Noto Sans SC';
                    ctx.textAlign = 'right';
                    ctx.fillText(val, layout.pl - 15, y + 6);
                }
                
                // 小刻度线
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(layout.pl - (val % 5 === 0 ? 10 : 5), y);
                ctx.lineTo(layout.pl, y);
                ctx.stroke();
            }

            // 2. 绘制方块堆
            const availableWidth = canvas.width - layout.pl - layout.pr;
            const spacing = (availableWidth - n * layout.blockWidth) / (n + 1);

            students.forEach((s, i) => {
                const x = layout.pl + spacing + i * (layout.blockWidth + spacing);

                // 在柱子上方画出当前高度的数字，方便直观查看
                ctx.fillStyle = '#64748b';
                ctx.font = 'bold 22px Noto Sans SC';
                ctx.textAlign = 'center';
                const labelY = layout.baseY - (s.blocks.length) * layout.unitHeight - 10;
                ctx.fillText(s.blocks.length, x + layout.blockWidth / 2, labelY);

                // 绘制方块
                for (let j = 0; j < s.blocks.length; j++) {
                    if (isDragging && dragged && dragged.studentIndex === i && dragged.blockIndex === j) {
                        ctx.fillStyle = 'rgba(0,0,0,0.05)';
                        const y = layout.baseY - (j + 1) * layout.unitHeight + layout.gap / 2;
                        ctx.fillRect(x, y, layout.blockWidth, layout.boxSize);
                        continue;
                    }

                    // 核心：第 j 个方块的顶部刚好在 val = j + 1 的位置
                    const y = layout.baseY - (j + 1) * layout.unitHeight + layout.gap / 2;
                    drawSingleBlock(x, y, layout.blockWidth, layout.boxSize, s.blocks[j]);
                }

                // 姓名标签
                ctx.fillStyle = '#1e2937';
                ctx.font = '600 22px Noto Sans SC';
                ctx.textAlign = 'center';
                ctx.fillText(s.name, x + layout.blockWidth / 2, layout.baseY + 40);
            });

            // 3. 绘制随时变动、完美对齐坐标的“平均线”
            const sum = students.reduce((a, s) => a + s.blocks.length, 0);
            const avg = sum / n;
            const avgY = layout.baseY - avg * layout.unitHeight;
            const isBalanced = students.every(s => s.blocks.length === avg);

            // 当完全平均时，线变成绿色，否则为红色
            const lineColor = isBalanced ? '#22c55e' : '#ef4444';

            ctx.strokeStyle = lineColor;
            ctx.lineWidth = isBalanced ? 5 : 4;
            ctx.setLineDash(isBalanced ? [] : [10, 6]);
            ctx.beginPath();
            ctx.moveTo(layout.pl - 10, avgY);
            ctx.lineTo(canvas.width - layout.pr + 20, avgY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = lineColor;
            ctx.font = 'bold 26px Noto Sans SC';
            ctx.textAlign = 'left';
            ctx.fillText(`平均数 ${avg.toFixed(1)}`, canvas.width - layout.pr + 25, avgY + 8);

            // 4. 绘制悬浮拖拽的方块
            if (isDragging && dragged) {
                drawSingleBlock(mousePos.x - layout.blockWidth / 2, mousePos.y - layout.boxSize / 2, layout.blockWidth, layout.boxSize, dragged.color, true);
            }
        }

        // ==================== 拖拽与坐标系适配 ====================
        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function onMouseDown(e) {
            mousePos = getMousePos(e);
            const n = students.length;
            const availableWidth = canvas.width - layout.pl - layout.pr;
            const spacing = (availableWidth - n * layout.blockWidth) / (n + 1);

            for (let i = 0; i < n; i++) {
                const x = layout.pl + spacing + i * (layout.blockWidth + spacing);

                // 从最顶层的方块开始检测点击
                for (let j = students[i].blocks.length - 1; j >= 0; j--) {
                    const y = layout.baseY - (j + 1) * layout.unitHeight + layout.gap / 2;
                    
                    if (mousePos.x > x - 5 && mousePos.x < x + layout.blockWidth + 5 && 
                        mousePos.y > y - 5 && mousePos.y < y + layout.boxSize + 5) {
                        
                        dragged = { studentIndex: i, blockIndex: j, color: students[i].blocks[j] };
                        isDragging = true;
                        document.body.style.cursor = 'grabbing';
                        draw();
                        return;
                    }
                }
            }
        }

        function onMouseMove(e) {
            if (!isDragging) return;
            mousePos = getMousePos(e);
            draw(); 
        }

        function onMouseUp(e) {
            document.body.style.cursor = 'default';
            if (!isDragging || !dragged) {
                isDragging = false;
                return;
            }

            mousePos = getMousePos(e);
            const n = students.length;
            const availableWidth = canvas.width - layout.pl - layout.pr;
            const spacing = (availableWidth - n * layout.blockWidth) / (n + 1);

            for (let i = 0; i < n; i++) {
                const x = layout.pl + spacing + i * (layout.blockWidth + spacing);
                
                // 只要丢在对应的列宽度附近即可吸附
                if (mousePos.x > x - 30 && mousePos.x < x + layout.blockWidth + 30) {
                    if (i !== dragged.studentIndex) {
                        saveHistory();
                        students[dragged.studentIndex].blocks.splice(dragged.blockIndex, 1);
                        students[i].blocks.push(dragged.color);
                    }
                    break;
                }
            }

            isDragging = false;
            dragged = null;
            renderSidebar();
            updateStats();
            draw();
        }

        function onTouchStart(e) {
            if(e.target === canvas) e.preventDefault();
            const touch = e.touches[0];
            onMouseDown({clientX: touch.clientX, clientY: touch.clientY});
        }

        function onTouchMove(e) {
            if(isDragging) e.preventDefault();
            const touch = e.touches[0];
            onMouseMove({clientX: touch.clientX, clientY: touch.clientY});
        }

        function resetCurrent() {
            if (confirm("重置为默认数据吗？")) {
                students = [
                    {id:1, name:"杨羽", color:"#3b82f6", blocks: Array(6).fill("#3b82f6")},
                    {id:2, name:"曾诗涵", color:"#ec4899", blocks: Array(8).fill("#ec4899")},
                    {id:3, name:"李婷", color:"#8b5cf6", blocks: Array(5).fill("#8b5cf6")},
                    {id:4, name:"张伟", color:"#14b8a6", blocks: Array(10).fill("#14b8a6")},
                    {id:5, name:"王芳", color:"#f59e0b", blocks: Array(6).fill("#f59e0b")}
                ];
                history = [];
                renderSidebar();
                updateStats();
                draw();
                saveHistory();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
